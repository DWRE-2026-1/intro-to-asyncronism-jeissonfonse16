<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BaseDex | Pokédex</title>
    <link rel="preconnect" href="https://pokeapi.co" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="pokedex-device" aria-label="Dispositivo Pokédex">
      <span class="pokedex-screw pokedex-screw--tl" aria-hidden="true"></span>
      <span class="pokedex-screw pokedex-screw--tr" aria-hidden="true"></span>
      <span class="pokedex-screw pokedex-screw--bl" aria-hidden="true"></span>
      <span class="pokedex-screw pokedex-screw--br" aria-hidden="true"></span>

      <div class="pokedex-led-row" aria-hidden="true">
        <span class="led led-main-blue"></span>
        <div class="led-mini-group">
          <span class="led led-mini led-red"></span>
          <span class="led led-mini led-amber"></span>
          <span class="led led-mini led-green"></span>
        </div>
      </div>

      <div class="pokedex-brand">BaseDex</div>

      <!-- Zona 1: pantalla principal -->
      <div class="pokedex-screen-outer">
        <div class="pokedex-screen">
          <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
          <div id="results" class="results"></div>
        </div>
      </div>

      <div class="pokedex-panel-gap" aria-hidden="true"></div>

      <!-- Zona 2: controles inferiores -->
      <div class="pokedex-controls">
        <form id="simple-search-form" class="simple-search-form" novalidate>
          <label for="pokemon-query" class="visually-hidden">Nombre o número de Pokémon</label>
          <input
            id="pokemon-query"
            name="pokemon-query"
            type="text"
            placeholder="Nombre o #"
            autocomplete="off"
          />
          <button type="submit" id="simple-search-btn">Buscar</button>
        </form>

        <button type="button" class="toggle-advanced-btn" id="toggle-advanced-btn" aria-expanded="false">
          Filtros avanzados
        </button>

        <form id="advanced-search-form" class="advanced-search-form hidden" novalidate>
          <div class="field-group">
            <label for="type-filter">Tipo</label>
            <select id="type-filter" name="type">
              <option value="">Tipo</option>
              <option value="normal">Normal</option>
              <option value="fire">Fire</option>
              <option value="water">Water</option>
              <option value="grass">Grass</option>
              <option value="electric">Electric</option>
              <option value="psychic">Psychic</option>
              <option value="fighting">Fighting</option>
              <option value="rock">Rock</option>
              <option value="ground">Ground</option>
              <option value="poison">Poison</option>
              <option value="ice">Ice</option>
            </select>
          </div>

          <div class="field-group">
            <label for="height-filter">Altura máx. (dm)</label>
            <input id="height-filter" name="height" type="number" min="1" step="1" placeholder="—" />
          </div>

          <div class="field-group">
            <label for="weight-filter">Peso máx. (hg)</label>
            <input id="weight-filter" name="weight" type="number" min="1" step="1" placeholder="—" />
          </div>

          <button type="submit" id="advanced-search-btn">Aplicar</button>
        </form>
      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
